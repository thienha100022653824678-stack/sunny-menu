<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bếp Bánh Sunny - Menu</title>
    <style>
        body { font-family: sans-serif; background: #fff5f7; margin: 0; padding: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; max-width: 600px; margin: auto; }
        .item { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.05); cursor: pointer; }
        .item img { width: 100%; height: 160px; object-fit: cover; }
        .info { padding: 10px; text-align: center; }
        h3 { margin: 5px 0; font-size: 14px; color: #333; }
        .price { color: #ff5c8a; font-weight: bold; }
    </style>
</head>
<body>
    <h1 style="text-align:center; color:#ff5c8a;">Bếp Bánh Sunny</h1>
    <div class="grid">
    <div class="item" onclick="window.location.href='https://khoa-hoc-thach.vercel.app/banh_quy_bo/'">
        <img src="/Images/banhquy.jpg">
        <div class="info"><h3>Khóa học Bánh Quy Bơ</h3><div class="price">199.000đ</div></div>
    </div>
    <div class="item" onclick="window.location.href='https://khoa-hoc-thach.vercel.app/banh_chuoi/'">
        <img src="https://cdn.hstatic.net/files/200000700229/article/banh-chuoi-chien-thumb_622cc7da733a46b68b12ad97bb85e6dd.jpg">
        <div class="info"><h3>Khóa học Bánh Chuối</h3><div class="price">199.000đ</div></div>
    </div>
    <div class="item" onclick="window.location.href='https://khoa-hoc-thach.vercel.app/tom_chien/'">
        <img src="https://cdn.tgdd.vn/2022/09/CookDish/2-cach-lam-tom-chien-xu-rao-dau-gion-rum-ai-cung-me-avt-1200x676.jpg">
        <div class="info"><h3>Khóa học Tôm Chiên</h3><div class="price">199.000đ</div></div>
    </div></div>
</body>
</html>
